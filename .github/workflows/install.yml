name: install

env:
  MAAFW_VERSION: ""
  MFAA_VERSION: ""
  MXU_VERSION: ""

permissions:
  contents: write
  actions: write

on:
  push:
    tags:
      - "v*"
    branches:
      - "**"
    paths:
      - ".github/workflows/install.yml"
      - "assets/**"
      - "**.py"
  pull_request:
    branches:
      - "**"
    paths:
      - ".github/workflows/install.yml"
      - "assets/**"
      - "**.py"
  workflow_dispatch:

jobs:
  meta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: set_tag
        run: |
          is_release=${{ startsWith(github.ref, 'refs/tags/v') }}
          tag=$(git describe --tags --match "v*" ${{ github.ref }} || true)
          if [[ $tag != v* ]]; then
            tag=$(curl -sX GET "https://api.github.com/repos/${{ github.repository }}/releases/latest" --header 'authorization: Bearer ${{ secrets.GITHUB_TOKEN }}' | awk '/tag_name/{print $4}' FS='["]')
            if [[ $tag != v* ]]; then
              tag="v0.0.0"
            fi
            tag=$(date "+$tag-%y%m%d-$(git rev-parse --short HEAD)")
          fi

          if ! $($is_release) ; then
            prefix=${tag%-*-*}
            suffix=${tag#$prefix-}
            tag="$prefix-ci.$suffix"
          fi

          is_prerelease=false
          if [[ $tag =~ .*alpha.* || $tag =~ .*beta.* || $tag =~ .*rc.* || $tag =~ .*dev.* || $tag =~ .*-ci.* ]]; then
            is_prerelease=true
          fi

          echo tag=$tag | tee -a $GITHUB_OUTPUT
          echo is_release=$is_release | tee -a $GITHUB_OUTPUT
          echo is_prerelease=$is_prerelease | tee -a $GITHUB_OUTPUT
    outputs:
      tag: ${{ steps.set_tag.outputs.tag }}
      is_release: ${{ steps.set_tag.outputs.is_release }}
      is_prerelease: ${{ steps.set_tag.outputs.is_prerelease }}

  install:
    needs: meta
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [ win, macos, linux, android ]
        arch: [ aarch64, x86_64 ]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Download MaaFramework
        uses: robinraju/release-downloader@v1
        with:
          repository: MaaXYZ/MaaFramework
          fileName: "MAA-${{ matrix.os }}-${{ matrix.arch }}*"
          latest: ${{ env.MAAFW_VERSION == '' }}
          tag: ${{ env.MAAFW_VERSION }}
          out-file-path: "deps"
          extract: true

      # --------------------- MFAA ---------------------
      - name: Download MFAAvalonia
        if: matrix.os != 'android'
        id: download_mfa
        uses: robinraju/release-downloader@v1
        with:
          repository: SweetSmellFox/MFAAvalonia
          fileName: "MFAAvalonia-*-${{ (matrix.os == 'win' && 'win') || (matrix.os ==
            'macos' && 'osx') || (matrix.os == 'linux' && 'linux') }}-${{
            (matrix.arch == 'x86_64' && 'x64') || (matrix.arch == 'aarch64' &&
            'arm64') }}*"
          latest: ${{ env.MFAA_VERSION == '' }}
          tag: ${{ env.MFAA_VERSION }}
          out-file-path: "MFA"
          extract: true

      - name: Clean up MFAAvalonia archive
        if: matrix.os != 'android'
        shell: bash
        run: |
          ARCHIVE_FILE_PATH="${{ fromJson(steps.download_mfa.outputs.downloaded_files)[0] }}"
          rm -f "${ARCHIVE_FILE_PATH}"

      - name: Remove built-in runtime in MFA
        if: matrix.os != 'android'
        shell: bash
        run: rm -rf MFA/runtimes

      - name: Copy MFA files to install
        if: matrix.os != 'android'
        shell: bash
        run: |
          mkdir -p install
          rsync -av --ignore-existing MFA/ install/

      - name: Install (MFAA)
        shell: bash
        run: |
          cd tools/
          python -m pip install -r ./requirements.txt
          python ./install.py ${{ needs.meta.outputs.tag }} ${{ matrix.os }} ${{ matrix.arch }}

      - name: Prepare artifact for MFAA
        id: mfaa_artifact
        shell: bash
        run: |
          ARTIFACT_NAME="NTEToolbox-MFAA-${{ matrix.os }}-${{ matrix.arch }}"
          if [[ "${{ matrix.os }}" == "win" ]] || [[ "${{ matrix.os }}" == "macos" ]]; then
            # Windows/macOS: create 7z, upload the file
            7z a -t7z -mx=9 -m0=lzma2 -mfb=273 "${ARTIFACT_NAME}.7z" ./install/*
            echo "artifact_path=${ARTIFACT_NAME}.7z" >> $GITHUB_OUTPUT
          else
            # Other platforms: upload the whole directory, let upload-artifact zip it
            echo "artifact_path=install" >> $GITHUB_OUTPUT
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: NTEToolbox-MFAA-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ steps.mfaa_artifact.outputs.artifact_path }}

      # --------------------- MXU ---------------------
      - name: Clean install directory for MXU
        shell: bash
        run: |
          rm -rf install
          mkdir install

      - name: Download MXU
        if: matrix.os != 'android' && (matrix.os != 'linux' || matrix.arch == 'x86_64')
        id: download_mxu
        uses: robinraju/release-downloader@v1
        with:
          repository: MistEO/MXU
          fileName: "MXU-${{ matrix.os }}-${{ matrix.arch }}*"
          latest: ${{ env.MXU_VERSION == '' }}
          tag: ${{ env.MXU_VERSION }}
          out-file-path: "MXU"
          extract: true

      - name: Clean up MXU archive
        if: matrix.os != 'android' && (matrix.os != 'linux' || matrix.arch == 'x86_64')
        shell: bash
        run: |
          ARCHIVE_FILE_PATH="${{ fromJson(steps.download_mxu.outputs.downloaded_files)[0] }}"
          rm -f "${ARCHIVE_FILE_PATH}"

      - name: Keep only MXU executable
        if: matrix.os != 'android' && (matrix.os != 'linux' || matrix.arch == 'x86_64')
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "win" ]]; then
            find MXU -mindepth 1 ! -name 'mxu.exe' -exec rm -rf {} +
          else
            find MXU -mindepth 1 ! -name 'mxu' -exec rm -rf {} +
          fi

      - name: Setup maafw for MXU
        if: matrix.os != 'android' && (matrix.os != 'linux' || matrix.arch == 'x86_64')
        shell: bash
        run: |
          mkdir -p install/maafw
          cp -r deps/bin/* install/maafw/

      - name: Copy MXU files to install
        if: matrix.os != 'android' && (matrix.os != 'linux' || matrix.arch == 'x86_64')
        shell: bash
        run: rsync -av --ignore-existing MXU/ install/

      - name: Install (MXU)
        if: matrix.os != 'android' && (matrix.os != 'linux' || matrix.arch == 'x86_64')
        shell: bash
        run: |
          cd tools/
          python -m pip install -r ./requirements.txt
          python ./install.py ${{ needs.meta.outputs.tag }} ${{ matrix.os }} ${{ matrix.arch }} --skip-deps

      - name: Prepare artifact for MXU
        if: matrix.os != 'android' && (matrix.os != 'linux' || matrix.arch == 'x86_64')
        id: mxu_artifact
        shell: bash
        run: |
          ARTIFACT_NAME="NTEToolbox-MXU-${{ matrix.os }}-${{ matrix.arch }}"
          if [[ "${{ matrix.os }}" == "win" ]] || [[ "${{ matrix.os }}" == "macos" ]]; then
            7z a -t7z -mx=9 -m0=lzma2 -mfb=273 "${ARTIFACT_NAME}.7z" ./install/*
            echo "artifact_path=${ARTIFACT_NAME}.7z" >> $GITHUB_OUTPUT
          else
            echo "artifact_path=install" >> $GITHUB_OUTPUT
          fi

      - uses: actions/upload-artifact@v7
        if: matrix.os != 'android' && (matrix.os != 'linux' || matrix.arch == 'x86_64')
        with:
          name: NTEToolbox-MXU-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ steps.mxu_artifact.outputs.artifact_path }}

  changelog:
    name: Generate changelog
    needs: meta
    runs-on: ubuntu-latest
    outputs:
      release_body: ${{ steps.git-cliff.outputs.content }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate a changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: .github/cliff.toml
          args: >-
            -vv --latest --strip header ${{ needs.meta.outputs.is_prerelease ==
            'false' && '--tag-pattern "^v[0-9]+\\.[0-9]+\\.[0-9]+$"' || '' }}
        env:
          OUTPUT: CHANGES.md
          GITHUB_REPO: ${{ github.repository }}

  release:
    if: ${{ needs.meta.outputs.is_release == 'true' }}
    needs: [ meta, install, changelog ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p release_assets
          cd artifacts
          for d in */; do
            base="${d%/}"  # e.g., NTEToolbox-MFAA-win-x86_64
            # Check if this artifact contains a .7z file
            if [ -f "$base"/*.7z ]; then
              # It's a pre-compressed 7z file
              mv "$base"/*.7z "../release_assets/${base}-${{ needs.meta.outputs.tag }}.7z"
            else
              # It's a directory (upload-artifact zipped the folder)
              # Re-zip the contents into a .zip file
              (cd "$base" && zip -r "../../release_assets/${base}-${{ needs.meta.outputs.tag }}.zip" .)
            fi
          done

      - uses: softprops/action-gh-release@v2.2.2
        with:
          files: release_assets/*
          tag_name: ${{ needs.meta.outputs.tag }}
          body: ${{ needs.changelog.outputs.release_body }}
          draft: false
          prerelease: ${{ needs.meta.outputs.is_prerelease == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
