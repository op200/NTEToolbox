name: install

env:
  MAAFW_VERSION: ""
  MFAA_VERSION: ""
  MXU_VERSION: ""

permissions:
  contents: write
  actions: write

on:
  push:
    tags:
      - "v*"
    branches:
      - "**"
    paths:
      - ".github/workflows/install.yml"
      - "assets/**"
      - "**.py"
  pull_request:
    branches:
      - "**"
    paths:
      - ".github/workflows/install.yml"
      - "assets/**"
      - "**.py"
  workflow_dispatch:

jobs:
  meta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: set_tag
        run: |
          is_release=${{ startsWith(github.ref, 'refs/tags/v') }}
          tag=$(git describe --tags --match "v*" ${{ github.ref }} || true)

          if [[ $tag != v* ]]; then
            tag=$(curl -sX GET "https://api.github.com/repos/${{ github.repository }}/releases/latest" \
              --header 'authorization: Bearer ${{ secrets.GITHUB_TOKEN }}' | awk '/tag_name/{print $4}' FS='["]')
            [[ $tag != v* ]] && tag="v0.0.0"
            tag=$(date "+$tag-%y%m%d-$(git rev-parse --short HEAD)")
          fi

          if ! $($is_release); then
            prefix=${tag%-*-*}
            suffix=${tag#$prefix-}
            tag="$prefix-ci.$suffix"
          fi

          is_prerelease=false
          if [[ $tag =~ alpha|beta|rc|dev|-ci ]]; then
            is_prerelease=true
          fi

          echo tag=$tag >> $GITHUB_OUTPUT
          echo is_release=$is_release >> $GITHUB_OUTPUT
          echo is_prerelease=$is_prerelease >> $GITHUB_OUTPUT

    outputs:
      tag: ${{ steps.set_tag.outputs.tag }}
      is_release: ${{ steps.set_tag.outputs.is_release }}
      is_prerelease: ${{ steps.set_tag.outputs.is_prerelease }}

  install:
    needs: meta
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [ win, macos, linux, android ]
        arch: [ aarch64, x86_64 ]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      # ---------------- MAAFW ----------------
      - name: Download MaaFramework
        uses: robinraju/release-downloader@v1
        with:
          repository: MaaXYZ/MaaFramework
          fileName: "MAA-${{ matrix.os }}-${{ matrix.arch }}*"
          latest: ${{ env.MAAFW_VERSION == '' }}
          tag: ${{ env.MAAFW_VERSION }}
          out-file-path: "deps"
          extract: true

      # ---------------- MFAA ----------------
      - name: Download MFAAvalonia
        if: matrix.os != 'android'
        id: download_mfa
        uses: robinraju/release-downloader@v1
        with:
          repository: SweetSmellFox/MFAAvalonia
          fileName: "MFAAvalonia-*-${{ (matrix.os == 'win' && 'win') || (matrix.os ==
            'macos' && 'osx') || (matrix.os == 'linux' && 'linux') }}-${{
            (matrix.arch == 'x86_64' && 'x64') || (matrix.arch == 'aarch64' &&
            'arm64') }}*"
          latest: ${{ env.MFAA_VERSION == '' }}
          tag: ${{ env.MFAA_VERSION }}
          out-file-path: "MFA"
          extract: true

      - name: Clean MFA archive
        if: matrix.os != 'android'
        run: |
          rm -f "${{ fromJson(steps.download_mfa.outputs.downloaded_files)[0] }}"

      - name: Remove MFA runtime
        if: matrix.os != 'android'
        run: rm -rf MFA/runtimes

      # ---------------- MXU (新增) ----------------
      - name: Download MXU
        if: matrix.os != 'android'
        id: download_mxu
        uses: robinraju/release-downloader@v1
        with:
          repository: MistEO/MXU
          fileName: "*${{ matrix.os }}*${{ matrix.arch }}*"
          latest: ${{ env.MXU_VERSION == '' }}
          tag: ${{ env.MXU_VERSION }}
          out-file-path: "MXU"
          extract: true

      - name: Clean MXU archive
        if: matrix.os != 'android'
        run: |
          rm -f "${{ fromJson(steps.download_mxu.outputs.downloaded_files)[0] }}"

      # ---------------- INSTALL ----------------
      - name: Install
        run: |
          mkdir -p install

          # MFAA
          if [[ "${{ matrix.os }}" != "android" && -d "MFA" ]]; then
            mkdir -p install/MFAA
            rsync -av MFA/ install/MFAA/
          fi

          # MXU
          if [[ "${{ matrix.os }}" != "android" && -d "MXU" ]]; then
            mkdir -p install/MXU
            rsync -av MXU/ install/MXU/
          fi

          cd tools/
          python -m pip install -r requirements.txt
          python install.py ${{ needs.meta.outputs.tag }} ${{ matrix.os }} ${{ matrix.arch }}
          cd ..

      # ---------------- 上传（区分标志） ----------------
      - uses: actions/upload-artifact@v7
        with:
          name: NTEToolbox-${{ matrix.os }}-${{ matrix.arch }}-MFAA
          path: install/MFAA

      - uses: actions/upload-artifact@v7
        if: matrix.os != 'android'
        with:
          name: NTEToolbox-${{ matrix.os }}-${{ matrix.arch }}-MXU
          path: install/MXU

  changelog:
    name: Generate changelog
    needs: meta
    runs-on: ubuntu-latest
    outputs:
      release_body: ${{ steps.git-cliff.outputs.content }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: .github/cliff.toml
          args: >-
            -vv --latest --strip header ${{ needs.meta.outputs.is_prerelease ==
            'false' && '--tag-pattern "^v[0-9]+\\.[0-9]+\\.[0-9]+$"' || '' }}

        env:
          OUTPUT: CHANGES.md
          GITHUB_REPO: ${{ github.repository }}

  release:
    if: ${{ needs.meta.outputs.is_release == 'true' }}
    needs: [ meta, install, changelog ]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: assets

      - run: |
          cd assets
          for f in *; do
            (cd $f && zip -r ../$f-${{ needs.meta.outputs.tag }}.zip .)
          done

      - uses: softprops/action-gh-release@v2
        with:
          files: assets/*
          tag_name: ${{ needs.meta.outputs.tag }}
          body: ${{ needs.changelog.outputs.release_body }}
          prerelease: ${{ needs.meta.outputs.is_prerelease == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
