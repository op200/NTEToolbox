[remote.github]
owner = "op200"
repo  = "NTEToolbox"

[changelog]
# 标题
header = """
# 更新日志
"""

body = """
{%- macro remote_url() -%}
  https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}
{%- endmacro -%}

{% macro print_commit(commit) -%}
    - {% if commit.scope %}*({{ commit.scope }})* {% endif %}\
        {% if commit.breaking %}[**breaking**] {% endif %}\
        {{ commit.message | split(pat="\n") | first | upper_first }} \
        {% if commit.github.username %} @{{ commit.github.username }}{% else %} {{ commit.author.name }}{% endif %}
        {%- if commit.footers -%}
            {%- for footer in commit.footers -%}
                {%- if footer.token == "Co-authored-by" -%}
                    {%- set co_author_name = footer.value | split(pat=" <") | first | trim %} @{{ co_author_name }}
                {%- endif -%}
            {%- endfor -%}
        {%- endif %}
{% endmacro -%}

{% if version %}\
    ## {{ version | trim_start_matches(pat="v") }} ({{ timestamp | date(format="%Y-%m-%d") }})
{% else %}\
    ## 未发布
{% endif %}\

{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits
    | filter(attribute="scope")
    | sort(attribute="scope") %}
        {{ self::print_commit(commit=commit) }}
    {%- endfor %}
    {% for commit in commits %}
        {%- if not commit.scope -%}
            {{ self::print_commit(commit=commit) }}
        {% endif -%}
    {% endfor -%}
{% endfor -%}
{%- if github -%}
{% if github.contributors | filter(attribute="is_first_time", value=true) | length != 0 %}
  ## 新贡献者 ❤️
{% endif %}\
{% for contributor in github.contributors | filter(attribute="is_first_time", value=true) %}
  * @{{ contributor.username }} made their first contribution
    {%- if contributor.pr_number %} in \
      [#{{ contributor.pr_number }}]({{ self::remote_url() }}/pull/{{ contributor.pr_number }}) \
    {%- endif %}
{%- endfor -%}
{%- endif %}
"""

# 尾部
footer = """
"""

[git]
# 过滤提交
commit_parsers = [
    # 跳过包含 [skip changelog] 的 commit
    { body = ".*\\[skip changelog\\].*", skip = true },
    { body = ".*security", group = "<!-- 10 -->🔒 安全" },
    { message = ".*\\[skip changelog\\].*", skip = true },
    { message = "^((?i)bugfix|fix)", group = "<!-- 0 -->🐛 Bug 修复" },
    { message = "^((?i)docs?|documents?)", group = "<!-- 5 -->📚 文档更新" },
    { message = "^((?i)feature|feat)", group = "<!-- 1 -->✨ 新功能" },
    { message = "^((?i)improvements?|imp|impr)", group = "<!-- 2 -->✔ 优化" },
    { message = "^((?i)perf|performance)", group = "<!-- 3 -->🚀 性能优化" },
    { message = "^((?i)refactor|ref)", group = "<!-- 4 -->🔁 代码重构" },
    { message = "^(?i)chore", group = "<!-- 9 -->🔧 日常维护" },
    { message = "^(?i)chore\\(deps?\\)", group = "📦 依赖更新" },
    { message = "^(?i)ci", group = "<!-- 8 -->⚙️ 修改 CI" },
    { message = "^(?i)revert", group = "<!-- 11 -->↩ 撤销更改" },
    { message = "^(?i)styles?", group = "<!-- 6 -->🎨 样式调整" },
    { message = "^(?i)tests?", group = "<!-- 7 -->🧪 修改测试代码" },
]
conventional_commits = true # 使用约定式提交格式
filter_unconventional = false # 不过滤非约定式提交
protect_breaking_commits = true # 保留完整的 commit body
split_commits = true # 启用完整的 commit 信息

# 忽略这些提交
ignore_tags = "rc"

# 排序规则
sort_commits = "oldest"

# 启用GitHub集成
[git.github]
commits = true
